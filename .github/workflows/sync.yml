name: Sync Fork

on:
  schedule:
    - cron: '0 */4 * * *'  # alle 4 Stunden
  workflow_dispatch:      # manuell auslösbar

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git remote add upstream hhttps://github.com/ProtossBlaster/leapmotor-mate-addon.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push origin main
